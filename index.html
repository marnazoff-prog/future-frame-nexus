<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        background: #0f0f0f;
        color: white;
    }

    header {
        padding: 30px;
        text-align: center;
        border-bottom: 1px solid #222;
    }

    h1 {
        font-size: 42px;
        margin-bottom: 10px;
    }

    .subtitle {
        color: #999;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill,minmax(300px,1fr));
        gap: 20px;
        padding: 30px;
    }

    .photo {
        aspect-ratio: 4/3;
        border-radius: 12px;
        overflow: hidden;
        background: #1a1a1a;
    }

    .photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        color: #666;
        font-size: 18px;
        height: 100%;
    }
</style>
