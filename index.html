<!DOCTYPE html>

<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Frame Nexus</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    text-align:center;
    padding:30px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:20px;
    padding:20px;
}

.gallery img{
    width:100%;
    border-radius:12px;
}
</style>

</head>

<body>

<header>
    <h1>Future Frame Nexus</h1>
    <p>Live Event Gallery</p>
</header>

<div id="gallery" class="gallery"></div>

<script type="module">

import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = 'https://rbsxaxonludvljtdaykp.supabase.co'
const supabaseKey = 'sb_publishable_SA5DY69tNAwnmDCwYMyBfw_yW2IHtKX'

const supabase = createClient(
    supabaseUrl,
    supabaseKey
)

async function loadImages(){

    const { data, error } =
    await supabase.storage
    .from('Events')
    .list('test-event')

    if(error){
        console.error(error)
        return
    }

    const gallery =
    document.getElementById('gallery')

    gallery.innerHTML = ''

    data.forEach(file => {

        const imageUrl =
        `${supabaseUrl}/storage/v1/object/public/Events/test-event/${file.name}`

        const img =
        document.createElement('img')

        img.src = imageUrl

        gallery.appendChild(img)

    })
}

loadImages()

setInterval(loadImages,5000)

</script>

</body>
</html>
