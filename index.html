<!DOCTYPE html>

<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mastercard Event Gallery | Future Frame Nexus</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    color:white;
    font-family:Arial,sans-serif;
    background:
        radial-gradient(circle at 15% 25%, rgba(235,0,27,.22), transparent 28%),
        radial-gradient(circle at 85% 35%, rgba(247,158,27,.22), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,.03), transparent 40%),
        #050505;
}

header{
    padding:55px 20px 34px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,.08);
    position:relative;
    overflow:hidden;
}

header::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        radial-gradient(circle at 12% 55%, rgba(235,0,27,.32), transparent 26%),
        radial-gradient(circle at 88% 60%, rgba(247,158,27,.32), transparent 26%);
    opacity:.9;
    pointer-events:none;
}

header > *{
    position:relative;
    z-index:2;
}

.brand-mark{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:18px;
}

.circle{
    width:58px;
    height:58px;
    border-radius:50%;
    opacity:.95;
}

.circle.red{
    background:#EB001B;
    margin-right:-16px;
}

.circle.orange{
    background:#F79E1B;
}

.logo{
    font-size:13px;
    letter-spacing:4px;
    color:#aaa;
    text-transform:uppercase;
    margin-bottom:20px;
}

h1{
    margin:0;
    font-size:44px;
    letter-spacing:10px;
    font-weight:500;
}

.subtitle{
    margin-top:18px;
    color:#ddd;
    letter-spacing:4px;
    font-size:14px;
    text-transform:uppercase;
}

.year{
    margin-top:22px;
    color:#F79E1B;
    font-size:30px;
    letter-spacing:7px;
    font-weight:bold;
}

.event-name{
    margin-top:18px;
    color:#F79E1B;
    font-size:18px;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:14px;
    max-width:1050px;
    margin:28px auto 0;
    padding:0 20px;
}

.dashboard div{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    border-radius:22px;
    padding:18px;
    text-align:center;
}

.dashboard span{
    display:block;
    color:#888;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1.5px;
    margin-bottom:7px;
}

.dashboard strong{
    font-size:21px;
    color:white;
}

.status{
    text-align:center;
    color:#aaa;
    padding:22px;
    font-size:14px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:20px;
    padding:24px;
    max-width:1450px;
    margin:0 auto;
}

.card{
    background:#111;
    border:1px solid rgba(255,255,255,.08);
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 12px 35px rgba(0,0,0,.45);
    transition:.25s ease;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:
        0 0 20px rgba(235,0,27,.25),
        0 0 45px rgba(247,158,27,.15);
}

.card img{
    width:100%;
    height:100%;
    display:block;
    object-fit:cover;
    cursor:pointer;
}

.empty{
    text-align:center;
    color:#777;
    padding:60px 20px;
}

footer{
    text-align:center;
    color:#555;
    padding:34px;
    font-size:13px;
    letter-spacing:1px;
}

.lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.96);
    z-index:9999;
    justify-content:center;
    align-items:center;
    padding:20px;
    touch-action:pan-y;
}

.lightbox.active{display:flex}

.lightbox img{
    max-width:95%;
    max-height:88%;
    object-fit:contain;
    border-radius:14px;
    box-shadow:
        0 0 28px rgba(235,0,27,.22),
        0 0 55px rgba(247,158,27,.16);
}

.nav{
    position:fixed;
    top:50%;
    transform:translateY(-50%);
    background:rgba(255,255,255,.12);
    color:white;
    border:0;
    width:48px;
    height:70px;
    font-size:38px;
    cursor:pointer;
    z-index:10000;
    border-radius:14px;
}

.nav.left{left:18px}
.nav.right{right:18px}

.close{
    position:fixed;
    top:18px;
    right:22px;
    background:rgba(255,255,255,.12);
    color:white;
    border:0;
    width:44px;
    height:44px;
    font-size:28px;
    cursor:pointer;
    z-index:10000;
    border-radius:50%;
}

.lightbox-actions{
    position:fixed;
    bottom:48px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:12px;
    z-index:10000;
}

.action-btn{
    background:linear-gradient(90deg,#EB001B,#F79E1B);
    color:white;
    border:0;
    padding:10px 20px;
    border-radius:999px;
    text-decoration:none;
    font-size:14px;
    cursor:pointer;
}

.counter{
    position:fixed;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    color:#aaa;
    font-size:14px;
    z-index:10000;
}

@media(max-width:700px){
    header{
        padding:42px 16px 28px;
    }

    h1{
        font-size:28px;
        letter-spacing:5px;
    }

    .subtitle{
        font-size:12px;
        letter-spacing:2px;
    }

    .year{
        font-size:24px;
    }

    .gallery{
        grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
        gap:12px;
        padding:12px;
    }

    .nav{display:none}
}
</style>

</head>

<body>

<header>
    <div class="brand-mark">
        <div class="circle red"></div>
        <div class="circle orange"></div>
    </div>

```
<div class="logo">Mastercard Event Experience</div>
<h1>FUTURE OF PAYMENTS</h1>
<div class="subtitle">Connecting. Innovating. Empowering.</div>
<div class="year">2026</div>
<div id="eventName" class="event-name"></div>
```

</header>

<div class="dashboard">
    <div>
        <span>Event</span>
        <strong id="dashEvent">-</strong>
    </div>

```
<div>
    <span>Photos</span>
    <strong id="dashPhotos">0</strong>
</div>

<div>
    <span>Online</span>
    <strong id="dashOnline">0</strong>
</div>

<div>
    <span>Total visitors</span>
    <strong id="dashTotalVisitors">0</strong>
</div>

<div>
    <span>Last upload</span>
    <strong id="dashLastUpload">-</strong>
</div>
```

</div>

<div id="status" class="status">Loading gallery...</div>
<div id="gallery" class="gallery"></div>

<footer>Powered by Future Frame Nexus</footer>

<div id="lightbox" class="lightbox">
    <button id="closeBtn" class="close">×</button>
    <button id="prevBtn" class="nav left">‹</button>
    <img id="lightboxImage">
    <button id="nextBtn" class="nav right">›</button>

```
<div class="lightbox-actions">
    <a id="downloadBtn" class="action-btn" download>Download</a>
    <button id="shareBtn" class="action-btn">Share</button>
</div>

<div id="counter" class="counter"></div>
```

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = 'https://rbsxaxonludvljtdaykp.supabase.co'
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJic3hheG9ubHVkdmxqdGRheWtwIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MTU1MjAxMCwiZXhwIjoyMDk3MTI4MDEwfQ.V2mZ3V8W2pKBSdUs8eI3nJRi2iai3ZpNnz7Cepqiu7Y'

const params = new URLSearchParams(window.location.search)
let eventSlug = params.get('event')

if (!eventSlug) {
    const pathParts = window.location.pathname.split('/')
    if (pathParts[1] === 'event' && pathParts[2]) {
        eventSlug = pathParts[2]
    }
}

eventSlug = eventSlug || 'test-event'

document.getElementById('eventName').innerText =
'Mastercard Future of Payments 2026'

document.getElementById('dashEvent').innerText =
'Mastercard 2026'

const supabase = createClient(supabaseUrl, supabaseKey)

const gallery = document.getElementById('gallery')
const status = document.getElementById('status')
const lightbox = document.getElementById('lightbox')
const lightboxImage = document.getElementById('lightboxImage')
const counter = document.getElementById('counter')
const downloadBtn = document.getElementById('downloadBtn')
const shareBtn = document.getElementById('shareBtn')
const closeBtn = document.getElementById('closeBtn')
const prevBtn = document.getElementById('prevBtn')
const nextBtn = document.getElementById('nextBtn')

let photos = []
let shownPhotos = new Set()
let currentPhotoIndex = 0
let touchStartX = 0
let touchEndX = 0

let sessionId = localStorage.getItem('nexus_session_id')

if(!sessionId){
    sessionId = crypto.randomUUID()
    localStorage.setItem('nexus_session_id', sessionId)
}

function openLightbox(index){
    currentPhotoIndex = index
    lightbox.classList.add('active')
    updateLightbox()
}

function closeLightbox(){
    lightbox.classList.remove('active')
}

function updateLightbox(){
    if(photos.length === 0) return

    const currentPhoto = photos[currentPhotoIndex]

    lightboxImage.src = currentPhoto.public_url
    downloadBtn.href = currentPhoto.public_url
    downloadBtn.setAttribute('download', currentPhoto.file_name || 'future-frame-photo.jpg')

    counter.innerText = `${currentPhotoIndex + 1} / ${photos.length}`
}

function nextPhoto(){
    if(photos.length === 0) return
    currentPhotoIndex = (currentPhotoIndex + 1) % photos.length
    updateLightbox()
}

function prevPhoto(){
    if(photos.length === 0) return
    currentPhotoIndex = (currentPhotoIndex - 1 + photos.length) % photos.length
    updateLightbox()
}

closeBtn.addEventListener('click', closeLightbox)

nextBtn.addEventListener('click', e => {
    e.stopPropagation()
    nextPhoto()
})

prevBtn.addEventListener('click', e => {
    e.stopPropagation()
    prevPhoto()
})

shareBtn.addEventListener('click', async () => {
    const currentPhoto = photos[currentPhotoIndex]

    if(navigator.share){
        await navigator.share({
            title: 'Future Frame Nexus',
            text: 'View this event photo',
            url: currentPhoto.public_url
        })
    }else{
        navigator.clipboard.writeText(currentPhoto.public_url)
        alert('Link copied')
    }
})

lightbox.addEventListener('click', e => {
    if(e.target === lightbox){
        closeLightbox()
    }
})

document.addEventListener('keydown', e => {
    if(!lightbox.classList.contains('active')) return

    if(e.key === 'Escape') closeLightbox()
    if(e.key === 'ArrowRight') nextPhoto()
    if(e.key === 'ArrowLeft') prevPhoto()
})

lightbox.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].screenX
})

lightbox.addEventListener('touchend', e => {
    touchEndX = e.changedTouches[0].screenX
    const diff = touchStartX - touchEndX

    if(Math.abs(diff) > 50){
        if(diff > 0){
            nextPhoto()
        }else{
            prevPhoto()
        }
    }
})

async function updateVisitor(){
    const { error } = await supabase.rpc('track_visitor', {
        p_event_slug: eventSlug,
        p_session_id: sessionId
    })

    if(error){
        console.error('VISITOR ERROR:', error)
    }
}

async function loadOnlineGuests(){
    const { data, error } = await supabase.rpc('count_online_visitors', {
        p_event_slug: eventSlug
    })

    if(error){
        console.error('ONLINE ERROR:', error)
        return
    }

    document.getElementById('dashOnline').innerText = data
}

async function loadTotalVisitors(){
    const { data, error } = await supabase.rpc('count_total_visitors', {
        p_event_slug: eventSlug
    })

    if(error){
        console.error('TOTAL VISITORS ERROR:', error)
        return
    }

    document.getElementById('dashTotalVisitors').innerText = data
}

function formatTimeAgo(dateString){
    const lastDate = new Date(dateString + 'Z')
    const secondsAgo = Math.floor((Date.now() - lastDate.getTime()) / 1000)

    if(secondsAgo < 60) return 'Just now'
    if(secondsAgo < 3600) return `${Math.floor(secondsAgo / 60)} min ago`
    if(secondsAgo < 86400) return `${Math.floor(secondsAgo / 3600)} h ago`

    return `${Math.floor(secondsAgo / 86400)} d ago`
}

async function loadPhotos(){
    const { data, error } = await supabase
        .from('photos')
        .select('*')
        .eq('event_slug', eventSlug)
        .order('created_at', { ascending:false })

    if(error){
        status.innerText = 'Loading error'
        console.error(error)
        return
    }

    status.innerText = `Photos: ${data.length} • auto-refresh enabled`
    document.getElementById('dashPhotos').innerText = data.length

    if(data.length > 0){
        document.getElementById('dashLastUpload').innerText =
            formatTimeAgo(data[0].created_at)
    }

    if(data.length === 0){
        gallery.innerHTML = '<div class="empty">No photos for this event yet.</div>'
        return
    }

    photos = data

    data.forEach((photo, index) => {
        if(shownPhotos.has(photo.id)){
            return
        }

        shownPhotos.add(photo.id)

        const card = document.createElement('div')
        card.className = 'card'

        const img = document.createElement('img')
        img.src = photo.public_url
        img.loading = 'lazy'

        img.addEventListener('click', () => {
            openLightbox(index)
        })

        card.appendChild(img)
        gallery.appendChild(card)
    })

    if(lightbox.classList.contains('active')){
        updateLightbox()
    }
}

loadPhotos()
updateVisitor()
loadOnlineGuests()
loadTotalVisitors()

setInterval(loadPhotos,5000)
setInterval(updateVisitor,30000)
setInterval(loadOnlineGuests,10000)
setInterval(loadTotalVisitors,30000)
</script>

</body>
</html>
